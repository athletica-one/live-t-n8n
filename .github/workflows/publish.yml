name: Publish to npm

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      LIVE_T_API_BASE_URL: ${{ vars.LIVE_T_API_BASE_URL }}
      LIVE_T_WEB_BASE_URL: ${{ vars.LIVE_T_WEB_BASE_URL }}
      LIVE_T_REQUIRE_PROD_CONFIG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Run tests
        run: node --test

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          test "$PKG_VERSION" = "$TAG_VERSION"

      - name: Verify package contents
        run: npm pack --dry-run

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      LIVE_T_API_BASE_URL: ${{ vars.LIVE_T_API_BASE_URL }}
      LIVE_T_WEB_BASE_URL: ${{ vars.LIVE_T_WEB_BASE_URL }}
      LIVE_T_REQUIRE_PROD_CONFIG: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Publish package
        run: npm publish --provenance --access public
